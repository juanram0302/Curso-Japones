<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#991b1b"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="240" fill="url(#shine)"/>
  <!-- Torii gate -->
  <rect x="150" y="160" width="24" height="200" rx="4" fill="#fff"/>
  <rect x="338" y="160" width="24" height="200" rx="4" fill="#fff"/>
  <rect x="130" y="150" width="252" height="22" rx="6" fill="#fff"/>
  <rect x="142" y="190" width="228" height="14" rx="4" fill="#fff"/>
  <!-- Japanese character 学 (study) -->
  <text x="256" y="310" text-anchor="middle" font-family="serif" font-size="80" fill="#fff" font-weight="bold">学</text>
  <!-- Sakura petals -->
  <circle cx="130" cy="120" r="8" fill="#fecdd3" opacity="0.8"/>
  <circle cx="380" cy="110" r="6" fill="#fecdd3" opacity="0.7"/>
  <circle cx="110" cy="380" r="7" fill="#fecdd3" opacity="0.6"/>
  <circle cx="400" cy="370" r="9" fill="#fecdd3" opacity="0.7"/>
  <circle cx="160" cy="400" r="5" fill="#fecdd3" opacity="0.5"/>
  <circle cx="350" cy="400" r="6" fill="#fecdd3" opacity="0.6"/>
</svg>
